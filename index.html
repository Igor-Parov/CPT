<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  <title>APCS Exam Practice</title>
</head>

<body>



    <div id="header">
        <strong>Practice for APCS Exam</strong>
    </div>

    <div id="choose">
        <br>
        Choose which Unit you would like to study
    </div>

    <div id="units">
        <button onclick="showUnitInfo('U1')">Unit 1 - Digital Information</button>
        <button onclick="showUnitInfo('U2')">Unit 2 - The Internet</button>
        <button onclick="showUnitInfo('U3')">Unit 3 - Intro to App Design</button>
        <button onclick="showUnitInfo('U4')">Unit 4 - Variables, Conditionals, and Functions</button>
        <button onclick="showUnitInfo('U5')">Unit 5 - Data</button>
        <button onclick="showUnitInfo('U6')">Unit 6 - Lists, Loops, and Traversals</button>
        <button onclick="showUnitInfo('U7')">Unit 7 - Parameters, Return, and Libraries</button>
        <button onclick="showUnitInfo('U8')">Unit 8 - Cybersecurity and Global Impacts</button>
        <button onclick="showUnitInfo('U9')">Unit 9 - Algorithms</button>
    </div>
    <div id="unitInfo" style="display:none">
        <h2 id="unitName"></h2>
        <p id="unitDescription"></p>
        <button id="startQuizButton">Start Quiz</button>
        <button id="backButton">Back to Units</button>
    </div>
    <div id="quiz" style="display:none">
    <div id="qNumber"></div>
    <div id="qText"></div>
    <div id="answers">
        <button id="a0"></button>
        <button id="a1"></button>
        <button id="a2"></button>
        <button id="a3"></button>
    </div>

</div>
    <div id = wrongAnswer style="display:none">
        <p>Wrong answer! The correct answer was: <span id="correctAnswer"></span></p> </div>
    <div id = okButtonDiv style="display: none">
        <button id = "okButton">OK</button>
    </div>
        <div id ="results" style="display:none">
        <h2>Quiz Results</h2>
        <p>Your score is: <span id="score">0</span>/15</p>
        <button onclick="location.reload()">Start Over</button>
        
    </div>

    <script src="js/quiz.js"></script>
    <script src="js/info.js"></script>
    <script src="js/u1.js"></script>
    <script src="js/u2.js"></script>
    <script src="js/u3.js"></script>
    <script src="js/u4.js"></script>
    <script src="js/u5.js"></script>
    <script src="js/u6.js"></script>
    <script src="js/u7.js"></script>
    <script src="js/u8.js"></script>
    <script src="js/u9.js"></script>
    <script src="js/script.js"></script>
    
</body>
</html>
